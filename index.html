<!DOCTYPE html>

<style>

body{
margin:0;
background:#0b0c0f;
display:flex;
justify-content:center;
align-items:center;

}

svg{
width:420px;
stroke:white;
stroke-width:6;
fill:none;
stroke-dasharray:800;
stroke-dashoffset:800;
animation:draw 6s ease forwards;
}

@keyframes draw{
to{

}
}

h1{
position:absolute;
bottom:60px;
font-weight:300;
letter-spacing:2px;
}

</style>

</head>

<body>

<svg viewBox="0 0 200 200">

<polygon points="100,10 190,180 10,180"/>

</svg>
