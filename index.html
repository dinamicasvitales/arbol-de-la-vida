<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinámicas Vitales</title>

<style>

body{
margin:0;
background:#0b0c0f;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
overflow:hidden;
}

.logo{
width:420px;
}

.line{
stroke:white;
stroke-width:6;
fill:none;
stroke-dasharray:600;
stroke-dashoffset:600;
}

.ancestor{
stroke:white;
stroke-width:4;
stroke-dasharray:200;
stroke-dashoffset:200;
}

h1{
margin-top:30px;
font-weight:300;
letter-spacing:3px;
}

@keyframes draw{
to{
stroke-dashoffset:0;
}
}

</style>

</head>

<body>

<svg class="logo" viewBox="0 0 200 200">

<!-- линии предков -->
<line class="ancestor" x1="40" y1="180" x2="160" y2="180"/>
<line class="ancestor" x1="50" y1="170" x2="150" y2="170"/>
<line class="ancestor" x1="60" y1="160" x2="140" y2="160"/>
<line class="ancestor" x1="70" y1="150" x2="130" y2="150"/>
<line class="ancestor" x1="80" y1="140" x2="120" y2="140"/>

<!-- треугольник -->
<polygon class="line" points="100,20 180,180 20,180"/>

<!-- лабиринт -->
<path class="line" d="M60 150 L140 150 L140 120 L100 80 L60 120 Z"/>

<!-- стрелка -->
<line class="line" x1="100" y1="140" x2="100" y2="90"/>
<polygon class="line" points="100,70 115,95 85,95"/>

</svg>

<h1>Dinámicas Vitales</h1>

<script>

const ancestors=document.querySelectorAll(".ancestor")
const lines=document.querySelectorAll(".line")

let delay=0

ancestors.forEach(line=>{
line.style.animation=`draw 1s ease forwards ${delay}s`
delay+=0.4
})

delay+=0.5

lines.forEach(line=>{
line.style.animation=`draw 2s ease forwards ${delay}s`
delay+=0.4
})

</script>

</body>
</html>
